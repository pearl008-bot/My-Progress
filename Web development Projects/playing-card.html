<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>
  <link rel="stylesheet" href="playing-card.css">
  <link rel="icon" type="image/x-icon" href="download.png">
</head>

<body>
  <main id="playing-cards">
    <div class="card left">
        <span class="top">A</span>
        <span class="top1">♥</span>
        <span class="center">♥</span>
        <span class="bottom">A</span>
        <span class="bottom1">♥</span>
    </div>
    <div class="card middle">
        <span class="top">2</span>
        <span class="top1">♣</span>
        <span class="center-middle1">♣</span>
        <span class="center-middle2">♣</span>
        <span class="bottom">2</span>
        <span class="bottom2">♣</span>
    </div>
    <div class="card right">
        <span class="top">3</span>
        <span class="top2">♠</span>
        <span class="center-right1">♠</span>
        <span class="center-right2">♠</span>
        <span class="center-right3">♠</span>
        <span class="bottom">3</span>
        <span class="bottom3">♠</span>
    </div>
  </main>
</body>

</html>
