<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Login Page</title>
    <link rel="stylesheet" href="facebook.css">
</head>
<body>
    <div class="page">
        <h1>Coral</h1>
        <p class="paragraph1">Coral helps you connect and share <br>with the people in your life and make new relationships and friends.</p>
    </div>
    <div class="login-container">
        <input type="email" name="email" id="email" placeholder="Email address or phone number" required><br>
        <input type="password" name="password" id="password" placeholder="Password" required><br>
        <button type="submit" class="login">Log in</button>
        <a href="link.html" class="forgot"><h5>Forgotten password?</h5></a>
        <hr>
        <br>
        <button type="submit" class="account">Create new account</button>
        <br>
        <br>
    </div>
    <div class="paragraph">
        <p><strong><a href="link.html" class="brand">Create a Page</a></strong> for a celebrity, brand or business.</p>
    </div>
</body>
</html>
